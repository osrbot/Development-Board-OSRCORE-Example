esp_toml_version = 1.0
firmware_images_url = "https://github.com/osrbot/Development-Board-OSRCORE-Example/releases/latest/download/"
supported_apps = [
  "01_blink_led",
  "02_buzzer",
  "03_pwm_servo",
  "04_sbus_rc",
  "05_imu_i2c",
  "06_encoder",
  "07_nvs",
  "08_freertos",
  "09_pid_motor",
  "10_ahrs",
  "11_mag_compass",
  "12_full_example"
]

[01_blink_led]
chipsets = ["ESP32-S3"]
image.esp32-s3 = "osrcore-01_blink_led.bin"
description = "WS2812B RGB LED color cycling with custom RMT encoder."
console_baudrate = 115200

[02_buzzer]
chipsets = ["ESP32-S3"]
image.esp32-s3 = "osrcore-02_buzzer.bin"
description = "Passive buzzer melody using LEDC frequency control."
console_baudrate = 115200

[03_pwm_servo]
chipsets = ["ESP32-S3"]
image.esp32-s3 = "osrcore-03_pwm_servo.bin"
description = "ESC arming and servo sweep (1000–2000 µs) via LEDC."
console_baudrate = 115200

[04_sbus_rc]
chipsets = ["ESP32-S3"]
image.esp32-s3 = "osrcore-04_sbus_rc.bin"
description = "SBUS frame decode — 16 channels, failsafe detection."
console_baudrate = 115200

[05_imu_i2c]
chipsets = ["ESP32-S3"]
image.esp32-s3 = "osrcore-05_imu_i2c.bin"
description = "QMI8658 accel/gyro/temp readout over I2C."
console_baudrate = 115200

[06_encoder]
chipsets = ["ESP32-S3"]
image.esp32-s3 = "osrcore-06_encoder.bin"
description = "Quadrature encoder with overflow accumulation and speed calculation."
console_baudrate = 115200

[07_nvs]
chipsets = ["ESP32-S3"]
image.esp32-s3 = "osrcore-07_nvs.bin"
description = "PID parameter persistence across reboots using NVS Flash."
console_baudrate = 115200

[08_freertos]
chipsets = ["ESP32-S3"]
image.esp32-s3 = "osrcore-08_freertos.bin"
description = "Dual-core task pinning, Queue, and Mutex."
console_baudrate = 115200

[09_pid_motor]
chipsets = ["ESP32-S3"]
image.esp32-s3 = "osrcore-09_pid_motor.bin"
description = "Closed-loop speed control: encoder → PID → ESC."
console_baudrate = 115200

[10_ahrs]
chipsets = ["ESP32-S3"]
image.esp32-s3 = "osrcore-10_ahrs.bin"
description = "Madgwick 6-DOF AHRS with IMU heater, quaternion → Euler angles."
console_baudrate = 115200

[11_mag_compass]
chipsets = ["ESP32-S3"]
image.esp32-s3 = "osrcore-11_mag_compass.bin"
description = "QMC6309 magnetometer, hard/soft-iron calibration, tilt-compensated heading."
console_baudrate = 115200

[12_full_example]
chipsets = ["ESP32-S3"]
image.esp32-s3 = "osrcore-12_full_example.bin"
description = "Complete robot: 3-task dual-core, SBUS + serial control, IMU heater."
console_baudrate = 115200
