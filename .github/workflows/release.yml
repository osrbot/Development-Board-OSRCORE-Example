name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download firmware binaries
        uses: actions/download-artifact@v4
        with:
          name: firmware-bins
          path: firmware/

      - name: Package all.zip
        run: |
          cd firmware
          echo "OSRCORE firmware — ${GITHUB_REF_NAME}" > README.txt
          echo "" >> README.txt
          echo "Flash any .bin file at address 0x0:" >> README.txt
          echo "  esptool.py --chip esp32s3 write_flash 0x0 osrcore-<example>.bin" >> README.txt
          zip -r ../all.zip . -x "*.DS_Store"
          cd ..

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            BODY=$(git log "${PREV_TAG}..HEAD" --oneline --no-decorate)
          else
            BODY=$(git log --oneline --no-decorate)
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: OSRCORE ${{ github.ref_name }}
          body: |
            ## Changes

            ${{ steps.changelog.outputs.body }}

            ## Flashing

            Each `.bin` is a merged (bootloader + partition-table + app) image flashable at offset `0x0`:

            ```bash
            esptool.py --chip esp32s3 write_flash 0x0 osrcore-<example>.bin
            ```

            Or use the [online flash tool](https://osrbot.github.io/Development-Board-OSRCORE-Example/flash) in Chrome/Edge.
          files: |
            firmware/osrcore-*.bin
            all.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
