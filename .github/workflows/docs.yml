name: Deploy VitePress Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package.json

      - name: Install dependencies
        working-directory: docs
        run: npm install

      - name: Check bilingual docs alignment
        working-directory: docs
        run: npm run i18n:check

      - name: Build with VitePress
        working-directory: docs
        run: npm run build

      - name: Deploy docs to gh-pages (preserve firmware/)
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "kitso666"
          git config user.email "kitso@osrbot.com"

          # Checkout gh-pages into a subdirectory
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages

          # Sync docs dist into gh-pages root, keeping firmware/ untouched
          rsync -av --delete \
            --exclude='firmware/' \
            --exclude='.git' \
            docs/.vitepress/dist/ /tmp/gh-pages/

          cd /tmp/gh-pages
          git add -A
          git commit -m "docs: deploy VitePress site from ${GITHUB_SHA::7}" || echo "Nothing to commit"
          git push origin HEAD:gh-pages
