name: Build Examples

on:
  push:
    branches: [main]
    paths:
      - '[0-9][0-9]_*/**'
      - 'components/**'
      - 'partitions_ota.csv'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - '[0-9][0-9]_*/**'
      - 'components/**'
      - 'partitions_ota.csv'
      - '.github/workflows/build.yml'
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact-name:
        description: Name of the uploaded firmware artifact
        value: firmware-bins

jobs:
  build:
    name: Build ${{ matrix.example }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - 01_blink_led
          - 02_buzzer
          - 03_pwm_servo
          - 04_sbus_rc
          - 05_imu_i2c
          - 06_encoder
          - 07_nvs
          - 08_freertos
          - 09_pid_motor
          - 10_ahrs
          - 11_mag_compass
          - 12_full_example
          - 13_factory_demo

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.example }}
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32s3
          path: ${{ matrix.example }}

      - name: Collect app image
        run: |
          cp ${{ matrix.example }}/build/${{ matrix.example }}.bin osrcore-${{ matrix.example }}-app.bin

      - name: Merge into single flashable binary
        run: |
          pip install esptool --quiet
          python -m esptool \
            --chip esp32s3 \
            merge_bin \
            --output osrcore-${{ matrix.example }}-full.bin \
            0x0    ${{ matrix.example }}/build/bootloader/bootloader.bin \
            0x8000 ${{ matrix.example }}/build/partition_table/partition-table.bin \
            0xd000 ${{ matrix.example }}/build/ota_data_initial.bin \
            0x10000 ${{ matrix.example }}/build/${{ matrix.example }}.bin

          if [ "${{ matrix.example }}" = "13_factory_demo" ]; then
            cp osrcore-${{ matrix.example }}-app.bin osrbot_ESP32S3_IDF_App.bin
            cp osrcore-${{ matrix.example }}-full.bin osrbot_ESP32S3_IDF_FullFlash.bin
          fi

      - name: Upload merged binary
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.example }}
          path: |
            osrcore-${{ matrix.example }}-app.bin
            osrcore-${{ matrix.example }}-full.bin
            osrbot_ESP32S3_IDF_App.bin
            osrbot_ESP32S3_IDF_FullFlash.bin
          retention-days: 7

  collect:
    name: Collect all binaries
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
          path: firmware/

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bins
          path: firmware/
          retention-days: 7

  publish-firmware:
    name: Publish firmware to gh-pages
    needs: build
    runs-on: ubuntu-latest
    # Only run on direct push to main, not on PRs or workflow_call
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pages: write
    steps:
      - name: Download all bin-* artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
          path: bins/

      - name: Generate manifest.json
        run: |
          SHA7="${GITHUB_SHA:0:7}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > manifest.json <<EOF
          {
            "version": "git-${SHA7}",
            "date": "${DATE}",
            "examples": [
              { "id": "01_blink_led",    "label": "Ch 01 — WS2812B RGB LED",         "bin": "/firmware/git-${SHA7}/osrcore-01_blink_led-full.bin" },
              { "id": "02_buzzer",       "label": "Ch 02 — Passive Buzzer",           "bin": "/firmware/git-${SHA7}/osrcore-02_buzzer-full.bin" },
              { "id": "03_pwm_servo",    "label": "Ch 03 — PWM Servo & ESC",          "bin": "/firmware/git-${SHA7}/osrcore-03_pwm_servo-full.bin" },
              { "id": "04_sbus_rc",      "label": "Ch 04 — SBUS RC Receiver",         "bin": "/firmware/git-${SHA7}/osrcore-04_sbus_rc-full.bin" },
              { "id": "05_imu_i2c",      "label": "Ch 05 — QMI8658 IMU",              "bin": "/firmware/git-${SHA7}/osrcore-05_imu_i2c-full.bin" },
              { "id": "06_encoder",      "label": "Ch 06 — Quadrature Encoder",       "bin": "/firmware/git-${SHA7}/osrcore-06_encoder-full.bin" },
              { "id": "07_nvs",          "label": "Ch 07 — NVS Persistence",          "bin": "/firmware/git-${SHA7}/osrcore-07_nvs-full.bin" },
              { "id": "08_freertos",     "label": "Ch 08 — FreeRTOS Tasks",           "bin": "/firmware/git-${SHA7}/osrcore-08_freertos-full.bin" },
              { "id": "09_pid_motor",    "label": "Ch 09 — PID Speed Loop",           "bin": "/firmware/git-${SHA7}/osrcore-09_pid_motor-full.bin" },
              { "id": "10_ahrs",         "label": "Ch 10 — Madgwick AHRS",            "bin": "/firmware/git-${SHA7}/osrcore-10_ahrs-full.bin" },
              { "id": "11_mag_compass",  "label": "Ch 11 — QMC6309 Magnetometer",     "bin": "/firmware/git-${SHA7}/osrcore-11_mag_compass-full.bin" },
              { "id": "12_full_example", "label": "Ch 12 — Full Robot Example",       "bin": "/firmware/git-${SHA7}/osrcore-12_full_example-full.bin" },
              { "id": "13_factory_demo", "label": "Ch 13 — Factory Demo",             "bin": "/firmware/git-${SHA7}/osrcore-13_factory_demo-full.bin" }
            ]
          }
          EOF

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ github.token }}

      - name: Copy bins and manifest into gh-pages
        run: |
          SHA7="${GITHUB_SHA:0:7}"
          DEST="gh-pages/firmware/git-${SHA7}"
          mkdir -p "$DEST"
          cp bins/*.bin "$DEST/"
          cp bins/osrbot_ESP32S3_IDF_App.bin gh-pages/firmware/osrbot_ESP32S3_IDF_App.bin
          cp bins/osrbot_ESP32S3_IDF_FullFlash.bin gh-pages/firmware/osrbot_ESP32S3_IDF_FullFlash.bin
          # versioned manifest
          cp manifest.json "$DEST/manifest.json"
          # stable pointer
          cp manifest.json gh-pages/firmware/manifest.json

      - name: Commit and push to gh-pages
        run: |
          SHA7="${GITHUB_SHA:0:7}"
          cd gh-pages
          git config user.name "kitso666"
          git config user.email "kitso@osrbot.com"
          git add firmware/
          git commit -m "firmware: publish git-${SHA7} bins and update manifest" || echo "Nothing to commit"
          git push
